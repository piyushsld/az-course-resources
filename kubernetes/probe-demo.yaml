apiVersion: apps/v1
kind: Deployment
metadata:
  name: probe-demo
  namespace: demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: probe-demo
  template:
    metadata:
      labels:
        app: probe-demo
    spec:
      containers:
      - name: app
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/sh
              - -c
              - |
                echo ok > /usr/share/nginx/html/healthy
                echo ok > /usr/share/nginx/html/ready
        # === STARTUP PROBE === (Gates liveness/readiness during boot)
        startupProbe:
          httpGet:
            path: /healthy  # Must return 200
            port: 80
          initialDelaySeconds: 0
          periodSeconds: 2
          failureThreshold: 15  # 30s max startup time
          timeoutSeconds: 1
        # === READINESS PROBE === (Traffic control - NOT healthy = NOT in Service)
        readinessProbe:
          httpGet:
            path: /ready   # Must return 200 to receive traffic
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3   # Remove from Service after 15s
          timeoutSeconds: 2
        # === LIVENESS PROBE === (Crash detection - NOT healthy = RESTART container)
        livenessProbe:
          httpGet:
            path: /healthy # Must return 200 or container restarts
            port: 80
          initialDelaySeconds: 20  # Wait for startup
          periodSeconds: 10
          failureThreshold: 3  # Restart after 30s
          timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: probe-demo-service
  namespace: demo
spec:
  selector:
    app: probe-demo
  ports:
  - port: 80
    targetPort: 80
