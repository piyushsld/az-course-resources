apiVersion: v1
kind: Secret
metadata:
  name: ecr-helm-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  name: devopsdojo-ecr
  type: helm
  url: <ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com
  enableOCI: "true"
  # For ECR authentication, use either:
  # Option 1: IAM Role (recommended for EKS with IRSA)
  # Option 2: Static credentials (not recommended)
  # username: AWS
  # password: <ecr-token>
