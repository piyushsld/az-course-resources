# CronJob to refresh ECR credentials for ArgoCD
# ECR tokens expire every 12 hours, this refreshes them
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-credentials-sync
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-credentials-sync
  namespace: argocd
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-credentials-sync
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: ecr-credentials-sync
    namespace: argocd
roleRef:
  kind: Role
  name: ecr-credentials-sync
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-credentials-sync
  namespace: argocd
spec:
  schedule: "0 */6 * * *"  # Every 6 hours
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ecr-credentials-sync
          restartPolicy: OnFailure
          containers:
            - name: ecr-credentials-sync
              image: amazon/aws-cli:latest
              envFrom:
                - secretRef:
                    name: ecr-credentials-sync-aws  # AWS credentials
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
                  ECR_TOKEN=$(aws ecr get-login-password --region ap-south-1)

                  kubectl delete secret ecr-helm-repo -n argocd --ignore-not-found

                  kubectl create secret generic ecr-helm-repo \
                    --namespace argocd \
                    --from-literal=name=devopsdojo-ecr \
                    --from-literal=type=helm \
                    --from-literal=url=${AWS_ACCOUNT_ID}.dkr.ecr.ap-south-1.amazonaws.com \
                    --from-literal=enableOCI=true \
                    --from-literal=username=AWS \
                    --from-literal=password=${ECR_TOKEN}

                  kubectl label secret ecr-helm-repo -n argocd argocd.argoproj.io/secret-type=repository

                  echo "ECR credentials refreshed successfully"
---
# AWS credentials for the CronJob (create separately with your credentials)
# kubectl create secret generic ecr-credentials-sync-aws -n argocd \
#   --from-literal=AWS_ACCESS_KEY_ID=xxx \
#   --from-literal=AWS_SECRET_ACCESS_KEY=xxx \
#   --from-literal=AWS_DEFAULT_REGION=ap-south-1
