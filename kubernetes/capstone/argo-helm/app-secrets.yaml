# Example: Using External Secrets Operator to manage app secrets
# This pulls secrets from AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: devopsdojo-secrets
  namespace: devopsdojo-dev  # Change per environment
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: devopsdojo-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: devopsdojo/dev/db  # AWS Secrets Manager path
        property: password
    - secretKey: SECRET_KEY
      remoteRef:
        key: devopsdojo/dev/app
        property: secret_key
    - secretKey: DB_USERNAME
      remoteRef:
        key: devopsdojo/dev/db
        property: username
---
# Alternative: SealedSecret (if using Bitnami Sealed Secrets)
