# # Example: Using External Secrets Operator to manage app secrets
# # This pulls secrets from AWS Secrets Manager
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: devopsdojo-secrets
#   namespace: devopsdojo-dev  # Change per environment
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     name: aws-secrets-manager
#     kind: ClusterSecretStore
#   target:
#     name: devopsdojo-secrets
#     creationPolicy: Owner
#   data:
#     - secretKey: DB_PASSWORD
#       remoteRef:
#         key: devopsdojo/dev/db  # AWS Secrets Manager path
#         property: password
#     - secretKey: SECRET_KEY
#       remoteRef:
#         key: devopsdojo/dev/app
#         property: secret_key
#     - secretKey: DB_USERNAME
#       remoteRef:
#         key: devopsdojo/dev/db
#         property: username
# ---
# # Alternative: SealedSecret (if using Bitnami Sealed Secrets)
# # Generate with: kubeseal --format yaml < secret.yaml > sealed-secret.yaml
# # apiVersion: bitnami.com/v1alpha1
# # kind: SealedSecret
# # metadata:
# #   name: devopsdojo-secrets
# #   namespace: devopsdojo-dev
# # spec:
# #   encryptedData:
# #     DB_PASSWORD: <encrypted>
# #     SECRET_KEY: <encrypted>
---
# apiVersion: v1
# kind: ServiceAccount
# metadata:
#   name: external-secrets
#   namespace: external-secrets
#   annotations:
#     azure.workload.identity/client-id: ''

apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: azure-keyvault
spec:
  provider:
    azurekv:
      vaultUrl: https://azurelddemouksouth01.vault.azure.net
      authType: WorkloadIdentity
      serviceAccountRef:
        name: external-secrets
        namespace: external-secrets
---
apiVersion: v1
kind: ServiceAccount
metadata:
  annotations:
    azure.workload.identity/client-id: 3332be33-ba18-4997-8d67-ad373bdd5b64
    azure.workload.identity/tenant-id: 6ba9d606-3474-492c-9a99-c2c94ad5462f
  name: external-secrets
  namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-secret
  namespace: tier3
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore

  target:
    name: postgres-secret

  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: postgres-password