# Development environment values
# Usage: helm install devopsdojo ./helm/devopsdojo -f ./helm/devopsdojo/values-dev.yaml

global:
  namespace: devopsdojo-dev

frontend:
  replicaCount: 1
  autoscaling:
    enabled: false
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"

backend:
  replicaCount: 1
  autoscaling:
    enabled: false
  env:
    flaskDebug: "1"
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "300m"

database:
  external:
    enabled: true
    host: "pgsql-lddemo.postgres.database.azure.com"  # Update with your dev DB host
    port: "5432"
    name: tier3db

secrets:
  dbUsername: pgadmin
  dbPassword: ""  # Update or use --set
  secretKey: "postgres-secret"

ingress:
  enabled: false

migration:
  enabled: true
