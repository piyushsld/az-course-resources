apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: devopsdojo-dev-secret
  namespace: devopsdojo-dev
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore

  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: postgres-password

  target:
    name: devopsdojo-dev-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # Fetched from Azure Key Vault
        DB_PASSWORD: "{{ .externalSecrets.DB_PASSWORD | default "{{ .Values.secrets.dbPassword }}" }}"
        # From values.yaml (non-sensitive)
        DB_USERNAME: "{{ .Values.secrets.dbUsername | quote }}"
        SECRET_KEY: "{{ .Values.secrets.secretKey | quote }}"
        DATABASE_URL: {{ printf "postgresql://%s:%s@%s:%s/%s" .Values.secrets.dbUsername (.externalSecrets.DB_PASSWORD | default .Values.secrets.dbPassword) (include "devopsdojo.database.host" .) (.Values.database.external.port | default "5432") (.Values.database.external.name | default "postgres") | quote }}
