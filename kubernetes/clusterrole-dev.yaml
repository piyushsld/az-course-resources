#Test - kubectl auth can-i delete pods --as=student-user
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: student-developer
rules:
# Core resources - read + logs
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
# Deployments - full lifecycle
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "scale"]
# StatefulSets read-only
- apiGroups: ["apps"]
  resources: ["statefulsets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: student-user-developer
subjects:
- kind: User
  name: student-user
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: student-developer
  apiGroup: rbac.authorization.k8s.io
