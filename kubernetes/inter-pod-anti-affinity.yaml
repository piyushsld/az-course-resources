apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-pod-anti-affinity
spec:
  replicas: 2
  selector:
    matchLabels:
      app: anti-demo
  template:
    metadata:
      labels:
        app: anti-demo
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - anti-demo
              topologyKey: kubernetes.io/hostname
      containers:
      - name: nginx
        image: nginx:1.25
