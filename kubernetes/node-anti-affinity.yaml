apiVersion: v1
kind: Pod
metadata:
  name: demo-node-anti-affinity
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: env
            operator: NotIn
            values:
            - prod
  containers:
  - name: nginx
    image: nginx:1.25
