apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/piyushsld/az-course-resources.git
    targetRevision: HEAD
    # targetRevision: main --- IGNORE ---
    path: kubernetes/helm/multi-app/k8s-menifests
    directory:
      include: '02-frontend-deployment.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: craftica
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
