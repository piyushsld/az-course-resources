apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: craftista-root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/piyushsld/az-course-resources.git
    targetRevision: prod
    # targetRevision: main --- IGNORE ---
    path: kubernetes/helm/multi-app/k8s-menifests/argocd-apps
    directory:
      recurse: true
      exclude: 'apps/*'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
