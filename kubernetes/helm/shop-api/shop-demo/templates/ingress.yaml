{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "shop-demo.fullname" . }}
  labels:
    {{- include "shop-demo.labels" . | nindent 4 }}
  annotations:
    {{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
  - hosts:
    - {{ .Values.ingress.frontendHost }}
    secretName: {{ .Values.ingress.tls.frontendSecretName }}
  - hosts:
    - {{ .Values.ingress.apiHost }}
    secretName: {{ .Values.ingress.tls.apiSecretName }}
  {{- end }}
  rules:
  - host: {{ .Values.ingress.frontendHost }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "shop-demo.fullname" . }}-frontend
            port:
              number: {{ .Values.frontend.service.port }}
      - path: /admin
        pathType: Prefix
        backend:
          service:
            name: {{ include "shop-demo.fullname" . }}-admin
            port:
              number: {{ .Values.admin.service.port }}
  - host: {{ .Values.ingress.apiHost }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "shop-demo.fullname" . }}-api
            port:
              number: {{ .Values.api.service.port }}
{{- end }}
