name: PR Workflow Plan

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TG_VERSION: "1.0.5"
  WORKING_DIR: "./terraform/"

jobs:
  plan-dev:
    name: Plan Dev
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terragrunt
        uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: ${{ env.TG_VERSION }}
          tofu_version: "1.12.0"

      - name: Terragrunt Init
        working-directory: ${{ env.WORKING_DIR }}/dev
        run: terragrunt init

      - name: Terragrunt Format Check
        working-directory: ${{ env.WORKING_DIR }}
        run: terragrunt run -all fmt 

      - name: Terragrunt Validate
        working-directory: ${{ env.WORKING_DIR }}/dev
        run: terragrunt validate

      - name: Terragrunt Plan Dev
        working-directory: ${{ env.WORKING_DIR }}/dev
        env:
          TF_VAR_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terragrunt plan \
            -var-file=dev.tfvars \
            -out=dev.tfplan

      - name: Display Dev Plan
        working-directory: ${{ env.WORKING_DIR }}/dev
        run: terragrunt show dev.tfplan --json

  plan-prod:
    name: Plan Prod
    runs-on: ubuntu-latest
    needs: plan-dev
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terragrunt
        uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: ${{ env.TG_VERSION }}
          tofu_version: "1.12.0"

      - name: Terragrunt Init
        working-directory: ${{ env.WORKING_DIR }}/prod
        run: terragrunt init

      - name: Terragrunt Format Check
        working-directory: ${{ env.WORKING_DIR }}
        run: terragrunt run -all fmt 

      - name: Terragrunt Validate
        working-directory: ${{ env.WORKING_DIR }}/prod
        run: terragrunt validate

      - name: Terragrunt Plan Prod
        working-directory: ${{ env.WORKING_DIR }}/prod
        env:
          TF_VAR_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terragrunt plan \
            -var-file=prod.tfvars \
            -out=prod.tfplan

      - name: Display Prod Plan
        working-directory: ${{ env.WORKING_DIR }}/prod
        run: terragrunt show prod.tfplan --json