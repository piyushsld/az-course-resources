name: Helm Deploy
run-name: "Helm Deploy: ${{ github.event.head_commit.message || github.workflow }}"

on:
  workflow_run:
    workflows: ["CICD Merge Workflow"]
    types:
      - completed

permissions:
  contents: read
  id-token: write

env:
  myAKSCluster: "aks-prod-uksouth-01"
  myResourceGroup: "rg-aks-prod-uksouth-01-dev"
  WORKING_DIR: "./kubernetes/helm/myapp/todo-app/"
  GITHUB_TOKEN: ${{ github.token }}


jobs:
  helm-deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: dev
    name: Deploy Helm Chart
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
      
      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/master/scripts/get-helm-3 | bash

      - name: Setup kubelogin
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: '0.2.17'

      - name: Set up kubeconfig
        run: |
          az aks get-credentials --resource-group ${{ env.myResourceGroup }} --name ${{ env.myAKSCluster }} --overwrite-existing

      - name: Convert kubeconfig
        run: |
          kubelogin convert-kubeconfig -l azurecli

      - name: Deploy Helm Chart
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          helm upgrade --install todo-dev . --namespace dev --create-namespace --values values.yaml
