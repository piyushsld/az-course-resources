  apply-dev:
    name: Apply Dev Environment
    environment: dev
    # needs: plan-dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Install Terragrunt
        uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: ${{ env.TG_VERSION }}
          tofu_version: '1.12.0'
      
      - name: Terragrunt init
        working-directory: ${{ env.WORKING_DIR }}/dev
        run: terragrunt init

      - name: Terragrunt fmt
        working-directory: ${{ env.WORKING_DIR }}
        run: terragrunt hcl fmt

      - name: Terragrunt validate
        working-directory: ${{ env.WORKING_DIR }}/dev
        run: terragrunt validate

      - name: Generate runner token
        id: token
        env:
          GH_TOKEN: ${{ secrets.RUNNER_ADMIN_PAT }}
        run: |
          TOKEN=$(gh api \
            -X POST \
            repos/${{ github.repository }}/actions/runners/registration-token \
            --jq '.token')

          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Terragrunt plan
        working-directory: ${{ env.WORKING_DIR }}/dev
        env: 
          TF_VAR_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_gh_runner_token: ${{ steps.token.outputs.token }}
          TF_VAR_gh_runner_url: ${{ secrets.GH_RUNNER_URL }}
        run: terragrunt plan -out=dev.tfplan -input=false

      - name: Terragrunt apply
        working-directory: ${{ env.WORKING_DIR }}/dev
        env: 
          TF_VAR_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_gh_runner_token: ${{ steps.token.outputs.token }}
          TF_VAR_gh_runner_url: ${{ secrets.GH_RUNNER_URL }}
        run: terragrunt apply dev.tfplan --auto-approve
