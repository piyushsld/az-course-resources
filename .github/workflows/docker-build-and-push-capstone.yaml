  build-and-push-frontend:
    name: Build and Push Frontend Image
    environment: dev
    # needs: changes
    # if: ${{ needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: self-hosted
    
    permissions:
      id-token: write
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          
      - name: Login to ACR
        run: |
          az acr login --name ${{ env.ECR_REGISTRY }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build and push Docker image Frontend
        working-directory: ${{ env.WORKING_DIR }}/frontend/
        run: |
          docker buildx build --platform linux/arm64 -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }} . --push

      - name: Update Kubernetes deployment manifest Frontend
        working-directory: ${{ env.WORKING_DIR }}/k8s
        run: |

          # Update the image in the deployment file
          sed -i "s|image:.*frontend.*|image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ env.IMAGE_TAG }}|g" \
            frontend.yaml

          echo "Updated Frontend yaml with new image tag -> ${{ env.IMAGE_TAG }}"
          echo "Image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ env.IMAGE_TAG }}"

      - name: Commit and push updated manifests Frontend
        working-directory: ${{ env.WORKING_DIR }}/k8s
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend.yaml
          git diff --staged --quiet || git commit -m "Update Frontend image to ${{ env.IMAGE_TAG }} tag"
          git pull --rebase origin ${{ env.environment_branch }}
          git push --force origin ${{ env.environment_branch }}

