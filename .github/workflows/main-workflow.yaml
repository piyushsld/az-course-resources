name: Merge Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.8.5"
  WORKING_DIR: "./terraform"

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

  plan-dev:
    name: Plan Dev
    runs-on: ubuntu-latest
    needs: validate
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Plan Dev
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -var-file=environments/dev.tfvars \
            -out=dev.tfplan

      - name: Upload Dev Plan
        uses: actions/upload-artifact@v4
        with:
          name: dev-plan
          path: ${{ env.WORKING_DIR }}/dev.tfplan

  apply-dev:
    name: Apply Dev
    runs-on: ubuntu-latest
    needs: plan-dev
    environment:
      name: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Download Dev Plan
        uses: actions/download-artifact@v4
        with:
          name: dev-plan
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply Dev
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve dev.tfplan

  plan-staging:
    name: Plan Staging
    runs-on: ubuntu-latest
    needs: apply-dev
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Plan Staging
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -var-file=environments/staging.tfvars \
            -out=staging.tfplan

      - name: Upload Staging Plan
        uses: actions/upload-artifact@v4
        with:
          name: staging-plan
          path: ${{ env.WORKING_DIR }}/staging.tfplan

  apply-staging:
    name: Apply Staging
    runs-on: ubuntu-latest
    needs: plan-staging
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Download Staging Plan
        uses: actions/download-artifact@v4
        with:
          name: staging-plan
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply Staging
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve staging.tfplan

  plan-prod:
    name: Plan Prod
    runs-on: ubuntu-latest
    needs: apply-staging
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Plan Prod
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -var-file=environments/prod.tfvars \
            -out=prod.tfplan

      - name: Upload Prod Plan
        uses: actions/upload-artifact@v4
        with:
          name: prod-plan
          path: ${{ env.WORKING_DIR }}/prod.tfplan

  apply-prod:
    name: Apply Prod
    runs-on: ubuntu-latest
    needs: plan-prod
    environment:
      name: prod
      url: https://portal.azure.com/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Download Prod Plan
        uses: actions/download-artifact@v4
        with:
          name: prod-plan
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply Prod
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve prod.tfplan
